<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Capstone Dashboard | Freight Cost & CO₂ Optimization</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --bg-alt: #020617;
      --card: #111827;
      --accent: #38bdf8;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --border-subtle: #1f2937;
      --radius-xl: 1.5rem;
      --radius-pill: 999px;
      --max-width: 1100px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      color: var(--text-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(16px);
      background: linear-gradient(to bottom, rgba(15, 23, 42, 0.92), rgba(15, 23, 42, 0.6), transparent);
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
    }

    .nav-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e5e7eb;
    }

    .logo span { color: var(--accent); }

    nav { display: flex; gap: 0.75rem; font-size: 0.85rem; }

    nav a {
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius-pill);
      color: var(--text-muted);
      border: 1px solid transparent;
    }

    nav a:hover {
      color: var(--text-main);
      border-color: rgba(148, 163, 184, 0.3);
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.08), transparent 60%);
    }

    nav a.active,
    .nav-cta {
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: #0f172a;
      font-weight: 600;
      border: none;
    }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 1.5rem;
      min-height: calc(100vh - 74px);
    }

    .dashboard-shell {
      margin-top: 1.5rem;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.98), #020617);
      padding: 1rem;
      min-height: 80vh;
    }

    .dashboard-shell iframe {
      width: 100%;
      height: 78vh;
      border: 0;
      border-radius: 1rem;
      background: #000;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-inner">
      <div class="logo">Capstone <span>2024–25</span></div>
      <nav>
        <a href="index.html#overview">Overview</a>
        <a href="index.html#data-methods">Data & Methods</a>
        <a href="index.html#models">Models</a>
        <a href="index.html#results">Results</a>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="index.html#artifacts" class="nav-cta">Paper & Assets</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="dashboard-shell">
      <iframe
        title="ArcGIS Freight Dashboard"
        src="https://your-arcgis-or-dashboard-link-here"
        loading="lazy"
        allowfullscreen>
      </iframe>
    </div>
  </main>
</body>
</html>
