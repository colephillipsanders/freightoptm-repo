<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Timezone Digital Clock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
      max-width: 800px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      font-size: 2.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .clocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .clock {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .clock:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .timezone-name {
      font-size: 1.1rem;
      color: #ffd700;
      font-weight: bold;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .time-display {
      font-size: 2.5rem;
      color: #ffffff;
      font-weight: bold;
      margin-bottom: 8px;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .date-display {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 300;
    }

    .timezone-offset {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 8px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    button {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: scale(0.95);
    }

    .format-toggle {
      display: flex;
      gap: 5px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      padding: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .format-btn {
      padding: 8px 16px;
      margin: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
    }

    .format-btn.active {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 20px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 25px;
      }

      .clocks-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .time-display {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌍 World Clock</h1>

    <div class="clocks-grid" id="clocksContainer">
      <!-- Clocks will be dynamically inserted here -->
    </div>

    <div class="controls">
      <div class="format-toggle">
        <button class="format-btn active" onclick="setFormat(24)">24H</button>
        <button class="format-btn" onclick="setFormat(12)">12H</button>
      </div>
      <button onclick="addCustomTimezone()">+ Add Timezone</button>
      <button onclick="resetToDefault()">Reset</button>
    </div>
  </div>

  <script>
    // Default timezones
    const defaultTimezones = [
      { name: 'New York', tz: 'America/New_York' },
      { name: 'London', tz: 'Europe/London' },
      { name: 'Tokyo', tz: 'Asia/Tokyo' },
      { name: 'Sydney', tz: 'Australia/Sydney' },
      { name: 'Dubai', tz: 'Asia/Dubai' },
      { name: 'San Francisco', tz: 'America/Los_Angeles' }
    ];

    let timezones = JSON.parse(localStorage.getItem('customTimezones')) || defaultTimezones;
    let format24 = true;

    function setFormat(format) {
      format24 = format === 24;
      document.querySelectorAll('.format-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      updateAllClocks();
    }

    function formatTime(date, use24Hour) {
      if (use24Hour) {
        return date.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
          timeZone: 'UTC'
        });
      } else {
        return date.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true,
          timeZone: 'UTC'
        });
      }
    }

    function updateAllClocks() {
      const container = document.getElementById('clocksContainer');
      container.innerHTML = '';

      timezones.forEach((tz, index) => {
        const now = new Date();
        const tzTime = new Date(now.toLocaleString('en-US', { timeZone: tz.tz }));

        const hours = String(tzTime.getHours()).padStart(2, '0');
        const minutes = String(tzTime.getMinutes()).padStart(2, '0');
        const seconds = String(tzTime.getSeconds()).padStart(2, '0');

        let timeStr;
        if (format24) {
          timeStr = `${hours}:${minutes}:${seconds}`;
        } else {
          let hours12 = tzTime.getHours() % 12 || 12;
          const ampm = tzTime.getHours() >= 12 ? 'PM' : 'AM';
          timeStr = `${String(hours12).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
        }

        const dateStr = tzTime.toLocaleDateString('en-US', {
          weekday: 'short',
          month: 'short',
          day: 'numeric'
        });

        // Calculate timezone offset
        const offset = new Date().toLocaleString('en-US', { timeZone: tz.tz });
        const tzDate = new Date(offset);
        const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
        const diff = (tzDate - utcDate) / (1000 * 60 * 60);
        const offsetStr = `UTC${diff > 0 ? '+' : ''}${diff === Math.floor(diff) ? diff : diff.toFixed(1)}`;

        const clockHTML = `
          <div class="clock">
            <div class="timezone-name">${tz.name}</div>
            <div class="time-display">${timeStr}</div>
            <div class="date-display">${dateStr}</div>
            <div class="timezone-offset">${offsetStr}</div>
            <button onclick="removeTimezone(${index})" style="margin-top: 15px; padding: 5px 10px; font-size: 0.8rem;">Remove</button>
          </div>
        `;

        container.insertAdjacentHTML('beforeend', clockHTML);
      });
    }

    function removeTimezone(index) {
      timezones.splice(index, 1);
      localStorage.setItem('customTimezones', JSON.stringify(timezones));
      updateAllClocks();
    }

    function addCustomTimezone() {
      const tzName = prompt('Enter timezone name (e.g., "Dubai"):');
      if (!tzName) return;

      const tzId = prompt('Enter timezone ID (e.g., "Asia/Dubai"):\n\nCommon timezones:\nAmerica/New_York, Europe/London, Asia/Tokyo,\nAustralia/Sydney, Asia/Dubai, America/Los_Angeles');
      if (!tzId) return;

      timezones.push({ name: tzName, tz: tzId });
      localStorage.setItem('customTimezones', JSON.stringify(timezones));
      updateAllClocks();
    }

    function resetToDefault() {
      timezones = defaultTimezones;
      localStorage.removeItem('customTimezones');
      updateAllClocks();
    }

    // Update clocks every second
    setInterval(updateAllClocks, 1000);

    // Initial render
    updateAllClocks();
  </script>
</body>
</html>
